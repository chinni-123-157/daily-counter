name: Daily Counter

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-counter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Counter
        run: |
          FILE="counter.txt"

          # If file doesn't exist or is empty, start from 0
          if [ ! -f "$FILE" ] || [ ! -s "$FILE" ]; then
            LAST=0
          else
            LAST=$(tail -n 1 "$FILE" | tr -d '[:space:]')
            # If last line is not a number, default to 0
            if ! [[ "$LAST" =~ ^[0-9]+$ ]]; then
              LAST=0
            fi
          fi

          NEXT=$((LAST + 1))
          echo "$NEXT" >> "$FILE"
          echo "✅ Appended: $NEXT"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add counter.txt
          git commit -m "Daily counter update: $(tail -n 1 counter.txt)"
          git push
